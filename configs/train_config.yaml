data:
  path: data/errors.json

model:
  name: TinyLlama/TinyLlama-1.1B-Chat-v1.0

output:
  adapter_dir: outputs/bug_explainer
  merged_model_dir: outputs/bug_explainer_final

training:
  max_seq_length: 512
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  logging_steps: 5
  save_steps: 50
  fp16: true

lora:   # ✅ THIS BLOCK MUST EXIST
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - v_proj